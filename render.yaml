services:
  - type: worker
    name: geo-stocks-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_scheduler.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: N8N_WEBHOOK_URL
        value: https://automation-ops.app.n8n.cloud/webhook/5853eefc-c17b-47e6-8a2d-b17bebec4c74
      - key: SCHEDULE_HOUR_IST
        value: "8"
      - key: SCHEDULE_MINUTE_IST
        value: "0"

  - type: web
    name: geo-stocks-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
